name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nfc
          POSTGRES_PASSWORD: nfc
          POSTGRES_DB: nfc
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U nfc"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 20

    env:
      DATABASE_URL: postgres://nfc:nfc@localhost:5432/nfc
      SHOPIFY_API_KEY: test
      SHOPIFY_API_SECRET: test
      SHOPIFY_APP_URL: http://localhost:3002
      COOKIE_SECRET: ci-test-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run migrations
        run: pnpm db:migrate

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test
