services:
  postgres:
    image: postgres:16-alpine
    container_name: nfc-postgres
    environment:
      POSTGRES_USER: nfc
      POSTGRES_PASSWORD: nfc
      POSTGRES_DB: nfc
    ports:
      - "5432:5432"
    volumes:
      - nfc-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nfc"]
      interval: 2s
      timeout: 3s
      retries: 20

volumes:
  nfc-pgdata:
